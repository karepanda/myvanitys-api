---
name: CD Workflow

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    # Ejecutar solo cuando el PR se haya mergeado
    if: github.event.pull_request.merged == true

# Agregar permisos para permitir crear y subir tags
permissions:
  contents: write
  packages: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.create_tag.outputs.new_version }}
      new_tag: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_USERNAME
          server-password: GITHUB_TOKEN

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn -s .mvn/settings.xml clean package -Dgithub.username=${{ github.actor }} -Dgithub.token=${{ secrets.PACKAGES_TOKEN }}
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Create new tag with SHA
        id: create_tag
        run: |
          # Get the short SHA of the current commit
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          # Create a tag with timestamp and SHA
          NEW_TAG="v${TIMESTAMP}-${SHORT_SHA}"
          NEW_VERSION="${TIMESTAMP}-${SHORT_SHA}"

          echo "Creating new tag: $NEW_TAG"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a $NEW_TAG -m "Release $NEW_TAG"
          git push origin $NEW_TAG

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.create_tag.outputs.new_version }}
          name: Release v${{ steps.create_tag.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  await-approval:
    needs: tag-and-release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Wait for manual approval
        run: echo "Deployment approved for version ${{ needs.tag-and-release.outputs.new_version }}"

  deploy-to-railway:
    needs: [ tag-and-release, await-approval ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -s .mvn/settings.xml clean package -Dgithub.username=${{ github.actor }} -Dgithub.token=${{ secrets.PACKAGES_TOKEN }}
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./DockerfileProduction
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ needs.tag-and-release.outputs.new_tag }}
          build-args: |
            GITHUB_USERNAME=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.PACKAGES_TOKEN }}

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: |
          # Configurar variables de entorno adicionales en Railway
          railway variables set GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          railway variables set GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          railway variables set OAUTH_REDIRECT_URI=${{ secrets.OAUTH_REDIRECT_URI }}
          railway variables set JWT_SECRET=${{ secrets.JWT_SECRET }}
          railway variables set SPRING_PROFILES_ACTIVE=prod

          # Link Docker image and deploy
          railway link
          railway service update --image ghcr.io/${{ github.repository }}:${{ needs.tag-and-release.outputs.new_tag }}
          railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
