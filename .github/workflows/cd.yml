---
name: CD Workflow

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    # Ejecutar solo cuando el PR se haya mergeado
    if: github.event.pull_request.merged == true

# Agregar permisos para permitir crear y subir tags
permissions:
  contents: write
  packages: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.create_tag.outputs.new_version }}
      new_tag: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_USERNAME
          server-password: GITHUB_TOKEN

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Create Maven settings.xml
        run: |
          mkdir -p .mvn
          cat > .mvn/settings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_USERNAME}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>

            <profiles>
              <profile>
                <id>default-profile</id>
                <repositories>
                  <repository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2</url>
                  </repository>
                </repositories>
              </profile>

              <profile>
                <id>myvanitys</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/karepanda/myvanitys-api-spec</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>

            <activeProfiles>
              <activeProfile>default-profile</activeProfile>
              <activeProfile>myvanitys</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Build with Maven
        run: mvn -s .mvn/settings.xml clean package
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Create new tag with SHA
        id: create_tag
        run: |
          # Get the short SHA of the current commit
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          # Create a tag with timestamp and SHA
          NEW_TAG="v${TIMESTAMP}-${SHORT_SHA}"
          NEW_VERSION="${TIMESTAMP}-${SHORT_SHA}"

          echo "Creating new tag: $NEW_TAG"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a $NEW_TAG -m "Release $NEW_TAG"
          git push origin $NEW_TAG

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.create_tag.outputs.new_version }}
          name: Release v${{ steps.create_tag.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  await-approval:
    needs: tag-and-release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Wait for manual approval
        run: echo "Deployment approved for version ${{ needs.tag-and-release.outputs.new_version }}"

  deploy-to-railway:
    needs: [ tag-and-release, await-approval ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Maven settings.xml
        run: |
          mkdir -p .mvn
          cat > .mvn/settings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_USERNAME}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>

            <profiles>
              <profile>
                <id>default-profile</id>
                <repositories>
                  <repository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2</url>
                  </repository>
                </repositories>
              </profile>

              <profile>
                <id>myvanitys</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/karepanda/myvanitys-api-spec</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>

            <activeProfiles>
              <activeProfile>default-profile</activeProfile>
              <activeProfile>myvanitys</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Build with Maven
        run: mvn -s .mvn/settings.xml clean package
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Create entrypoint.sh if not exists
        run: |
          if [ ! -f entrypoint.sh ]; then
            cat > entrypoint.sh << 'EOF'
            #!/bin/bash
            set -e

            # Extraer host y puerto de DATABASE_URL
            if [[ -n "$DATABASE_URL" ]]; then
              DB_HOST=$(echo $DATABASE_URL | sed -E 's/^.*:\/\/(.*):([0-9]+)\/.*$/\1/')
              DB_PORT=$(echo $DATABASE_URL | sed -E 's/^.*:\/\/(.*):([0-9]+)\/.*$/\2/')
            else
              DB_HOST=$PGHOST
              DB_PORT=$PGPORT
            fi

            # Esperar a que la base de datos esté disponible
            echo "Esperando que la base de datos esté disponible en $DB_HOST:$DB_PORT..."
            until nc -z $DB_HOST $DB_PORT; do
              echo "Base de datos no disponible, esperando..."
              sleep 2
            done
            echo "Base de datos disponible, continuando..."

            # Ejecutar migraciones de Flyway
            echo "Ejecutando migraciones de base de datos con Flyway..."
            flyway -url="${FLYWAY_URL}" \
                   -user="${FLYWAY_USER}" \
                   -password="${FLYWAY_PASSWORD}" \
                   -locations="${FLYWAY_LOCATIONS}" \
                   migrate

            # Verificar resultado de Flyway
            if [ $? -eq 0 ]; then
              echo "Migraciones ejecutadas correctamente"
            else
              echo "Error al ejecutar migraciones con Flyway"
              exit 1
            fi

            # Iniciar la aplicación Spring Boot
            echo "Iniciando la aplicación..."
            exec java ${JAVA_OPTS} -jar /app/app.jar
            EOF
            chmod +x entrypoint.sh
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./DockerfileProduction
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ needs.tag-and-release.outputs.new_tag }}

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: |
          # Configurar variables de entorno adicionales en Railway
          railway variables set GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          railway variables set GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          railway variables set OAUTH_REDIRECT_URI=${{ secrets.OAUTH_REDIRECT_URI }}
          railway variables set JWT_SECRET=${{ secrets.JWT_SECRET }}
          railway variables set SPRING_PROFILES_ACTIVE=prod

          # Link Docker image and deploy
          railway link
          railway service update --image ghcr.io/${{ github.repository }}:${{ needs.tag-and-release.outputs.new_tag }}
          railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
