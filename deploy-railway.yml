---
name: Deploy to Railway

on:
  workflow_run:
    workflows: [ "CD Workflow" ]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Connect to Railway and Deploy
        run: |
          # Configurar Flyway y otras variables de entorno importantes
          railway variables set SPRING_PROFILES_ACTIVE=prod
          railway variables set GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          railway variables set GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          railway variables set OAUTH_REDIRECT_URI=${{ secrets.OAUTH_REDIRECT_URI }}
          railway variables set JWT_SECRET=${{ secrets.JWT_SECRET }}

          # Link el proyecto de Railway
          railway link

          # Desplegar usando Docker y el tag más reciente
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
