server:
  servlet:
    context-path: /myvanitys
spring:
  profiles:
    active: dev

management:
  server:
    base-path: /actuator
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: "*"
info:
  app:
    name: MyVanitys API
    version: ${project.version}

google:
  client:
    id: ${GOOGLE_CLIENT_ID}
    secret: ${GOOGLE_CLIENT_SECRET}
  oauth:
    redirect-uri: http://localhost:5173/callback

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentPurposesOnlyDoNotUseInProduction}
  expiration: 86400000  # 24 hours in milliseconds
