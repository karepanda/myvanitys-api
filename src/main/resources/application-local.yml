# Configuración específica para entorno local
spring:
  datasource:
    hikari:
      connectionTimeout: 30000
      maximumPoolSize: 5
    url: jdbc:postgresql://localhost:5432/myvanitysdb
    username: myvanitys
    password: secret

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Configuración de OAuth para local
google:
  oauth:
    redirect-uri: http://localhost:5173/callback

# Configuración de seguridad para local
management:
  security:
    enabled: false

# Configuración de logging para desarrollo
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
      flywaydb: DEBUG
      springframework: DEBUG